name: CI

on:
  push:
    branches: [master, v5]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check

      - name: Lint
        run: bun run lint:check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify dist output
        run: |
          test -f dist/index.js || exit 1
          test -f dist/index.umd.cjs || exit 1
          test -f dist/style.css || exit 1
          echo "All dist files present"
